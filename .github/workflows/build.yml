name: Build and Validate

on:
  push:
    branches: 
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript type check
        run: npx tsc --noEmit
      
      - name: Build action
        run: npm run build
      
      - name: Verify dist/ exists
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "::error::dist/index.js not found after build"
            exit 1
          fi
          echo "✅ dist/index.js built successfully"
          
          # Show dist/ size
          echo "📦 dist/ size:"
          du -sh dist/
          ls -lh dist/index.js
      
      - name: Check dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "⚠️  dist/ has uncommitted changes"
            echo "This is OK for feature branches - will be built on merge to main"
            git diff --stat dist/
          else
            echo "✅ dist/ is up to date"
          fi
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}-${{ github.run_number }}
          path: dist/
          retention-days: 7
      
      - name: Comment on PR with artifact info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const stats = fs.statSync('dist/index.js');
            const size = (stats.size / 1024).toFixed(2);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Build Successful\n\n` +
                    `- **dist/index.js size:** ${size} KB\n` +
                    `- **Artifact:** \`dist-${context.runId}-${context.runNumber}\`\n\n` +
                    `You can test this branch by using:\n` +
                    `\`\`\`yaml\n` +
                    `uses: Walsen/hugo-to-devto-action@${context.ref.replace('refs/heads/', '')}\n` +
                    `\`\`\`\n\n` +
                    `The dist/ will be automatically built and committed when merged to main.`
            })
