# Runs on every push and PR. Uses a phased approach:
#   Phase 1 (validate) — fast type-check & lint (~30s), fails fast before building
#   Phase 2 (build)    — compile & verify dist/, uploads artifact
#   Phase 3 (pr-comment) — posts build summary on PRs (only runs if phases 1+2 pass)
name: Build and Validate

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write

# Cancel in-flight runs for the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Fast validation (type-check only, no full build) ───────────────
  validate:
    name: "Phase 1 · Type Check & Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Phase 2: Full build & artifact upload ───────────────────────────────────
  build:
    name: "Phase 2 · Build & Verify"
    needs: validate          # only runs if Phase 1 passes
    runs-on: ubuntu-latest
    outputs:
      dist-size: ${{ steps.inspect.outputs.size }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build action
        run: npm run build

      - name: Inspect dist/
        id: inspect
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "::error::dist/index.js not found after build"
            exit 1
          fi
          SIZE=$(du -sh dist/ | cut -f1)
          SIZE_KB=$(( $(stat -c%s dist/index.js) / 1024 ))
          echo "size=${SIZE_KB} KB" >> $GITHUB_OUTPUT
          echo "✅ dist/index.js built successfully (${SIZE_KB} KB)"

      - name: Check dist/ staleness (informational)
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "⚠️  dist/ differs from committed version (expected on feature branches)"
            git diff --stat dist/
          else
            echo "✅ dist/ matches committed version"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}-${{ github.run_number }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ─── Phase 3: PR comment (only on pull_request events) ───────────────────────
  pr-comment:
    name: "Phase 3 · PR Summary"
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR with build info
        uses: actions/github-script@v7
        with:
          script: |
            const size = '${{ needs.build.outputs.dist-size }}';
            const ref  = context.ref.replace('refs/heads/', '');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ Build Successful',
                '',
                `| Field | Value |`,
                `|---|---|`,
                `| **dist/index.js** | ${size} |`,
                `| **Artifact** | \`dist-${context.runId}-${context.runNumber}\` |`,
                `| **Branch** | \`${ref}\` |`,
                '',
                'Test this branch directly:',
                '```yaml',
                `uses: Walsen/hugo-to-devto-action@${ref}`,
                '```',
                '',
                '_dist/ will be automatically built and committed when merged to main._',
              ].join('\n')
            });
