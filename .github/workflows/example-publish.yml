# Publishes changed Hugo markdown posts to Dev.to on every push to main.
name: Example - Publish on Push

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'

jobs:
  publish-to-devto:
    name: Publish changed posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD^ to diff against

      - name: Get changed markdown files
        id: changed-files
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD -- '*.md' | tr '\n' ' ')
          echo "files=${FILES}" >> $GITHUB_OUTPUT
          echo "Changed files: ${FILES:-none}"

