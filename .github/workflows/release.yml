# Creates a GitHub Release when a semantic version tag (vX.Y.Z) is pushed.
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # strict semver: v1.0.0, v2.3.4, etc.

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build action
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in this Release

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Usage

            ```yaml
            - uses: Walsen/hugo-to-devto-action@${{ steps.version.outputs.version }}
              with:
                api-key: ${{ secrets.DEVTO_API_KEY }}
                file-path: 'content/posts/my-post.md'
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}  # auto pre-release for v1.0.0-beta
          files: dist/index.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
