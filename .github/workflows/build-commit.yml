# Builds the action and commits dist/ on merges to main.
# Only triggers on relevant source file changes to avoid unnecessary runs.
name: Build and Commit on Merge

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build action
        run: npm run build

      - name: Commit and push dist/ (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dist/)" ]; then
            git add dist/
            git commit -m "chore: build dist/ after merge [skip ci]"
            git push
            echo "✅ dist/ committed and pushed"
          else
            echo "✅ dist/ is already up to date, skipping commit"
          fi
